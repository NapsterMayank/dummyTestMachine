<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Machine Log</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --accent: #4f8ef7;
      --accent2: #6ee7b7;
      --text: #f1f5f9;
      --muted: #64748b;
      --border: #2e3347;
      --radius: 16px;
      --radius-sm: 10px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 16px;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .scene {
      display: none;
      flex-direction: column;
      height: 100%;
      overflow-y: auto;
      padding: 24px 20px 32px;
      animation: fadeIn 0.2s ease;
    }
    .scene.active { display: flex; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Header ── */
    .scene-header { margin-bottom: 24px; }
    .step-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(79,142,247,0.12);
      padding: 4px 10px;
      border-radius: 20px;
      margin-bottom: 10px;
    }
    .scene-title { font-size: 24px; font-weight: 700; line-height: 1.2; }
    .scene-sub   { font-size: 14px; color: var(--muted); margin-top: 6px; }

    /* ── Machine list ── */
    .machine-list { display: flex; flex-direction: column; gap: 10px; flex: 1; }

    .machine-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .machine-card:active { background: var(--surface2); border-color: var(--accent); }

    .machine-thumb {
      width: 48px; height: 48px;
      border-radius: 8px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      overflow: hidden;
    }
    .machine-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .machine-info { flex: 1; }
    .machine-name { font-weight: 600; font-size: 15px; }
    .machine-type { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .machine-arrow { color: var(--muted); font-size: 18px; }

    .btn-add-machine {
      margin-top: 14px;
      padding: 16px;
      background: transparent;
      border: 1.5px dashed var(--border);
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-add-machine:active { border-color: var(--accent); color: var(--accent); }

    /* ── New machine flow ── */
    .photo-zone {
      position: relative;
      background: var(--surface);
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      height: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      overflow: hidden;
      flex-shrink: 0;
    }
    .photo-zone:active { border-color: var(--accent); }
    .photo-zone img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .photo-zone .overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 6px;
    }
    .photo-icon  { font-size: 36px; }
    .photo-label { font-size: 14px; color: var(--muted); font-weight: 500; }
    #fileInput   { display: none; }

    .analyzing-bar {
      display: none;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      color: var(--accent);
      font-size: 14px;
      font-weight: 500;
    }
    .analyzing-bar.show { display: flex; }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(79,142,247,0.3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Fields ── */
    .fields { display: flex; flex-direction: column; gap: 14px; margin-top: 20px; }

    .field-group { display: flex; flex-direction: column; gap: 6px; }
    .field-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .field-row { display: flex; gap: 8px; align-items: center; }

    input[type="text"] {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      font-size: 16px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--muted); }

    .mic-btn {
      flex-shrink: 0;
      width: 48px; height: 48px;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 20px;
      transition: background 0.2s, border-color 0.2s;
      color: var(--muted);
    }
    .mic-btn.listening {
      background: rgba(79,142,247,0.15);
      border-color: var(--accent);
      color: var(--accent);
    }
    .speech-hint {
      font-size: 12px; color: var(--muted);
      margin-top: 2px; min-height: 16px;
    }
    .speech-hint.active { color: var(--accent); }

    /* ── Machine chip (scene log) ── */
    .machine-chip {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      flex-shrink: 0;
      margin-bottom: 4px;
    }
    .machine-chip-thumb {
      width: 40px; height: 40px;
      border-radius: 8px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      overflow: hidden;
    }
    .machine-chip-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .machine-chip-name  { font-weight: 600; font-size: 15px; }
    .machine-chip-label { font-size: 12px; color: var(--muted); }

    /* ── Buttons ── */
    .btn-primary {
      margin-top: auto;
      padding: 17px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }
    .btn-primary:active { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-ghost {
      padding: 15px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }
    .btn-ghost:active { background: var(--surface2); }

    .back-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 14px;
      cursor: pointer;
      padding: 0 0 18px 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .back-btn:hover { color: var(--text); }

    /* ── Done scene ── */
    .done-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-align: center;
    }
    .done-icon {
      width: 80px; height: 80px;
      background: rgba(110,231,183,0.12);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      margin-bottom: 8px;
    }
    .done-title { font-size: 26px; font-weight: 700; }
    .done-sub   { font-size: 15px; color: var(--muted); }

    .done-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      width: 100%;
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .done-row { display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
    .done-row-label { color: var(--muted); }
    .done-row-val   { font-weight: 600; max-width: 60%; text-align: right; }

    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>
<body>
<div class="app">

  <!-- ═══════════════════════════════════
       SCENE: Machine List (Home)
  ════════════════════════════════════ -->
  <div class="scene active" id="sceneHome">
    <div class="scene-header">
      <div class="step-badge">Machines</div>
      <h1 class="scene-title">Select Machine</h1>
      <p class="scene-sub">Tap to log a repair</p>
    </div>

    <div class="machine-list" id="machineList">
      <div class="empty-state">Loading...</div>
    </div>

    <button class="btn-add-machine" id="btnAddMachine">
      + Add New Machine
    </button>
  </div>

  <!-- ═══════════════════════════════════
       SCENE: New Machine (photo + name)
  ════════════════════════════════════ -->
  <div class="scene" id="sceneNewMachine">
    <button class="back-btn" id="backFromNew">← Back</button>

    <div class="scene-header">
      <div class="step-badge">New Machine</div>
      <h1 class="scene-title">Add Machine</h1>
      <p class="scene-sub">Take a photo, then confirm the name</p>
    </div>

    <div class="photo-zone" id="photoZone">
      <div class="photo-icon">📷</div>
      <div class="photo-label">Tap to capture</div>
    </div>
    <input type="file" id="fileInput" accept="image/*" capture="environment" />

    <div class="analyzing-bar" id="analyzingBar">
      <div class="spinner"></div>
      <span id="analyzingText">Reading image...</span>
    </div>

    <div class="fields">
      <div class="field-group">
        <div class="field-label">Machine Name</div>
        <input type="text" id="newMachineName" placeholder="e.g. Diesel Generator" />
      </div>
    </div>

    <button class="btn-primary" id="btnCreateMachine" style="margin-top: 24px;" disabled>
      Confirm Machine →
    </button>
  </div>

  <!-- ═══════════════════════════════════
       SCENE: Log Repair
  ════════════════════════════════════ -->
  <div class="scene" id="sceneLog">
    <button class="back-btn" id="backFromLog">← Back</button>

    <div class="scene-header">
      <div class="step-badge">Log Repair</div>
      <h1 class="scene-title">What happened?</h1>
    </div>

    <div class="machine-chip" id="machineChip">
      <div class="machine-chip-thumb" id="chipThumb">⚙️</div>
      <div>
        <div class="machine-chip-name" id="chipName">—</div>
        <div class="machine-chip-label">Machine</div>
      </div>
    </div>

    <div class="fields" style="margin-top: 20px; flex: 1;">
      <div class="field-group">
        <div class="field-label">What broke?</div>
        <div class="field-row">
          <input type="text" id="issueTitle" placeholder="e.g. Not starting" />
          <button class="mic-btn" id="micIssue">🎤</button>
        </div>
        <div class="speech-hint" id="speechHintIssue"></div>
      </div>

      <div class="field-group">
        <div class="field-label">Part replaced</div>
        <div class="field-row">
          <input type="text" id="partName" placeholder="e.g. Starter Motor" />
          <button class="mic-btn" id="micPart">🎤</button>
        </div>
        <div class="speech-hint" id="speechHintPart"></div>
      </div>
    </div>

    <button class="btn-primary" id="btnLog">Log Repair ✓</button>
  </div>

  <!-- ═══════════════════════════════════
       SCENE: Done
  ════════════════════════════════════ -->
  <div class="scene" id="sceneDone">
    <div class="done-body">
      <div class="done-icon">✓</div>
      <div class="done-title">Repair Logged</div>
      <div class="done-sub">Saved to database</div>

      <div class="done-card">
        <div class="done-row">
          <span class="done-row-label">Machine</span>
          <span class="done-row-val" id="doneMachine">—</span>
        </div>
        <div class="done-row">
          <span class="done-row-label">Issue</span>
          <span class="done-row-val" id="doneIssue">—</span>
        </div>
        <div class="done-row">
          <span class="done-row-label">Part Used</span>
          <span class="done-row-val" id="donePart">—</span>
        </div>
      </div>
    </div>

    <button class="btn-ghost" id="btnAnother">Log Another Repair</button>
  </div>

</div>

<script>
  // ── State ──
  let currentMachineId   = null;
  let currentMachineName = null;
  let previewUrl         = null;

  // ── Scene nav ──
  function goTo(id) {
    document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // ── Load machine list ──
  async function loadMachines() {
    const list = document.getElementById('machineList');
    try {
      const res      = await fetch('/machines');
      const machines = await res.json();

      if (!machines.length) {
        list.innerHTML = '<div class="empty-state">No machines yet. Add one below.</div>';
        return;
      }

      list.innerHTML = machines.map(m => `
        <div class="machine-card" data-id="${m.id}" data-name="${m.name}" data-img="${m.image_file || ''}">
          <div class="machine-thumb">
            ${m.image_file
              ? `<img src="/uploads/${m.image_file}" />`
              : machineEmoji(m.name)}
          </div>
          <div class="machine-info">
            <div class="machine-name">${m.name}</div>
            <div class="machine-type">${m.type || 'Machine'}</div>
          </div>
          <div class="machine-arrow">›</div>
        </div>
      `).join('');

      list.querySelectorAll('.machine-card').forEach(card => {
        card.addEventListener('click', () => {
          currentMachineId   = parseInt(card.dataset.id);
          currentMachineName = card.dataset.name;
          openLogScene(card.dataset.img);
        });
      });

    } catch (e) {
      list.innerHTML = '<div class="empty-state">Could not load machines.</div>';
    }
  }

  function machineEmoji(name) {
    const n = name.toLowerCase();
    if (n.includes('generator')) return '⚡';
    if (n.includes('compressor')) return '💨';
    if (n.includes('pump')) return '💧';
    if (n.includes('engine') || n.includes('motor')) return '⚙️';
    return '🔧';
  }

  // ── Open log scene ──
  function openLogScene(imageFile) {
    document.getElementById('chipName').textContent = currentMachineName;
    const thumb = document.getElementById('chipThumb');
    if (imageFile) {
      thumb.innerHTML = `<img src="/uploads/${imageFile}" />`;
    } else {
      thumb.textContent = machineEmoji(currentMachineName);
    }
    document.getElementById('issueTitle').value = '';
    document.getElementById('partName').value   = '';
    document.getElementById('speechHintIssue').textContent = '';
    document.getElementById('speechHintPart').textContent  = '';
    goTo('sceneLog');
  }

  // ── Back buttons ──
  document.getElementById('backFromNew').addEventListener('click', () => goTo('sceneHome'));
  document.getElementById('backFromLog').addEventListener('click', () => goTo('sceneHome'));

  // ── Add machine button ──
  document.getElementById('btnAddMachine').addEventListener('click', () => {
    // Reset new machine form
    const pz = document.getElementById('photoZone');
    pz.innerHTML = '<div class="photo-icon">📷</div><div class="photo-label">Tap to capture</div>';
    document.getElementById('fileInput').value = '';
    document.getElementById('newMachineName').value = '';
    document.getElementById('btnCreateMachine').disabled = true;
    document.getElementById('analyzingBar').classList.remove('show');
    previewUrl = null;
    goTo('sceneNewMachine');
  });

  // ── Photo capture ──
  const photoZone  = document.getElementById('photoZone');
  const fileInput  = document.getElementById('fileInput');
  const nameInput  = document.getElementById('newMachineName');
  const btnCreate  = document.getElementById('btnCreateMachine');
  const analyzingBar  = document.getElementById('analyzingBar');
  const analyzingText = document.getElementById('analyzingText');

  photoZone.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (!file) return;

    previewUrl = URL.createObjectURL(file);
    photoZone.innerHTML = `
      <img src="${previewUrl}" />
      <div class="overlay">
        <div style="font-size:24px">📷</div>
        <div style="font-size:13px;color:#fff;font-weight:500">Tap to change</div>
      </div>`;
    photoZone.addEventListener('click', () => fileInput.click());

    // Show analyzing state, then mock-fill name
    analyzingBar.classList.add('show');
    analyzingText.textContent = 'Reading image...';
    nameInput.value = '';
    btnCreate.disabled = true;

    setTimeout(() => {
      analyzingText.textContent = 'Done — confirm name below';
      nameInput.value = 'Diesel Generator';
      nameInput.select();
      btnCreate.disabled = false;
      setTimeout(() => analyzingBar.classList.remove('show'), 2000);
    }, 1400);
  });

  nameInput.addEventListener('input', () => {
    btnCreate.disabled = nameInput.value.trim() === '';
  });

  // ── Create machine ──
  btnCreate.addEventListener('click', async () => {
    btnCreate.disabled = true;
    btnCreate.textContent = 'Saving...';

    const formData = new FormData();
    formData.append('name', nameInput.value.trim());
    if (fileInput.files[0]) formData.append('image', fileInput.files[0]);

    try {
      const res  = await fetch('/machines', { method: 'POST', body: formData });
      const data = await res.json();

      currentMachineId   = data.id;
      currentMachineName = data.name;
      await loadMachines(); // refresh list in background
      openLogScene(data.image_file);
    } catch (e) {
      alert('Could not save machine. Is the server running?');
      btnCreate.disabled = false;
      btnCreate.textContent = 'Confirm Machine →';
    }
  });

  // ── Speech helper ──
  function startSpeech(targetInput, hintEl, btnEl) {
    if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
      hintEl.textContent = 'Speech not supported here';
      return;
    }
    const SR  = window.SpeechRecognition || window.webkitSpeechRecognition;
    const rec = new SR();
    rec.lang = 'en-US';
    rec.interimResults = true;
    btnEl.classList.add('listening');
    hintEl.classList.add('active');
    hintEl.textContent = 'Listening...';
    rec.onresult = e => {
      targetInput.value = Array.from(e.results).map(r => r[0].transcript).join('');
      hintEl.textContent = e.results[e.results.length - 1].isFinal ? 'Got it ✓' : 'Listening...';
    };
    rec.onerror = () => {
      hintEl.textContent = 'Could not hear — try again';
      hintEl.classList.remove('active');
      btnEl.classList.remove('listening');
    };
    rec.onend = () => {
      btnEl.classList.remove('listening');
      hintEl.classList.remove('active');
    };
    rec.start();
  }

  document.getElementById('micIssue').addEventListener('click', () =>
    startSpeech(document.getElementById('issueTitle'), document.getElementById('speechHintIssue'), document.getElementById('micIssue'))
  );
  document.getElementById('micPart').addEventListener('click', () =>
    startSpeech(document.getElementById('partName'), document.getElementById('speechHintPart'), document.getElementById('micPart'))
  );

  // ── Log Repair ──
  document.getElementById('btnLog').addEventListener('click', async () => {
    const issue = document.getElementById('issueTitle').value.trim();
    const part  = document.getElementById('partName').value.trim();

    if (!issue || !part) {
      alert('Please fill in both fields.');
      return;
    }

    const btn = document.getElementById('btnLog');
    btn.disabled = true;
    btn.textContent = 'Saving...';

    try {
      const res  = await fetch(`/machines/${currentMachineId}/log`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ issue_title: issue, part_name: part })
      });
      const data = await res.json();

      document.getElementById('doneMachine').textContent = data.machine.name;
      document.getElementById('doneIssue').textContent   = data.issue.title;
      document.getElementById('donePart').textContent    = data.part.part_name;

      goTo('sceneDone');
    } catch (e) {
      alert('Could not save. Is the server running?');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Log Repair ✓';
    }
  });

  // ── Log Another ──
  document.getElementById('btnAnother').addEventListener('click', () => {
    loadMachines();
    goTo('sceneHome');
  });

  // ── Init ──
  loadMachines();
</script>
</body>
</html>
